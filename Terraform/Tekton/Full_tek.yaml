#################################################
# TASK: GIT CLONE
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-devsecops
spec:
  params:
  - name: repo-url
  workspaces:
  - name: output
  steps:
  - name: clone
    image: alpine/git
    workingDir: $(workspaces.output.path)
    script: |
      git clone $(params.repo-url) $(workspaces.output.path)

#################################################
# TASK: MAVEN BUILD
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: build
    image: maven:3.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      mvn clean package -DskipTests

#################################################
# TASK: UNIT TESTS
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: test
    image: maven:3.9
    workingDir: $(workspaces.source.path)
    script: |
      mvn test

#################################################
# TASK: MUTATION TESTS
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: mutation
    image: maven:3.9
    workingDir: $(workspaces.source.path)
    script: |
      mvn org.pitest:pitest-maven:mutationCoverage || true

#################################################
# TASK: SONAR SCAN
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube-scan
  namespace: tekton-devsecops

spec:

  workspaces:
  - name: source

  steps:
  - name: scan
    image: sonarsource/sonar-scanner-cli
    workingDir: $(workspaces.source.path)

    env:
    - name: SONAR_HOST_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: SONAR_URL

    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: sonar-secret
          key: token

    script: |
      echo "SONAR_HOST_URL=$SONAR_HOST_URL"
      echo "TOKEN LENGTH=${#SONAR_TOKEN}"
      
      sonar-scanner \
        -Dsonar.projectKey=devsecops \
        -Dsonar.sources=. \
        -Dsonar.java.binaries=target/classes \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN
    #-Dsonar.login=$SONAR_TOKEN


#################################################
# TASK: GITLEAKS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitleaks
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: scan-secrets
    image: zricethezav/gitleaks
    script: |
      gitleaks detect --source $(workspaces.source.path) --no-git || true
#################################################
# TASK: DEPENDENCY CHECK
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: syft-sbom
  namespace: tekton-devsecops

spec:
  workspaces:
    - name: source

  steps:
    - name: generate-sbom
      image: anchore/syft:latest
      workingDir: $(workspaces.source.path)
      command:
        - /syft
      args:
        - dir:$(workspaces.source.path)
        - -o cyclonedx-json=$(workspaces.source.path)/sbom.json

