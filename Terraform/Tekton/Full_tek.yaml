#################################################
# PIPELINE
#################################################

---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: devsecops-pipeline
  namespace: tekton-devsecops

spec:

  workspaces:
  - name: workspace

  params:

  - name: repo-url
  - name: image
  - name: zap-target
  # - name: gitops-repo
  # - name: argocd-app

  tasks:

  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: repo-url
      value: $(params.repo-url)
    workspaces:
    - name: output
      workspace: workspace

  - name: build
    runAfter: [clone]
    taskRef:
      name: maven-build
    workspaces:
    - name: source
      workspace: workspace

  - name: gitleaks
    runAfter: [build]
    taskRef:
      name: gitleaks
    workspaces:
    - name: source
      workspace: workspace

  - name: tests
    runAfter: [build]
    taskRef:
      name: unit-tests
    workspaces:
    - name: source
      workspace: workspace

  - name: mutation
    runAfter: [tests]
    taskRef:
      name: pit-tests
    workspaces:
    - name: source
      workspace: workspace

  - name: sonar
    runAfter: [mutation]
    taskRef:
      name: sonarqube-scan
    workspaces:
    - name: source
      workspace: workspace

  - name: sbom
    runAfter: [build]
    taskRef:
      name: syft-sbom
    workspaces:
      - name: source
        workspace: workspace

  - name: sca
    runAfter:
      - sbom
    taskRef:
      name: grype-scan
    workspaces:
      - name: source
        workspace: workspace

  # - name: dependency
  #   runAfter: [mutation]
  #   taskRef:
  #     name: dependency-check
  #   workspaces:
  #   - name: source
  #     workspace: workspace

  - name: trivy
    runAfter: [mutation]
    taskRef:
      name: trivy-fs
    workspaces:
    - name: source
      workspace: workspace

  - name: hadolint
    runAfter: [tests]
    taskRef: {name: hadolint}
    workspaces:
    - name: source
      workspace: workspace

  - name: opa
    runAfter: [mutation]
    taskRef:
      name: opa-docker
    workspaces:
    - name: source
      workspace: workspace

  - name: build-image
    # runAfter: [sonar,dependency,trivy,opa]
    runAfter: [sonar,sbom,sca,trivy,opa]
    taskRef:
      name: kaniko-build
    params:
    - name: image
      value: $(params.image)
    workspaces:
    - name: source
      workspace: workspace

  - name: image-scan
    runAfter: [build-image]
    taskRef:
      name: trivy-image
    params:
    - name: image
      value: $(params.image)

  # - name: upload-trivy
  #   runAfter: [image-scan]
  #   taskRef: {name: upload-defectdojo}
  #   params:
  #   - name: scan-file
  #     value: $(workspaces.source.path)/trivy-image.json
  #   - name: scan-type
  #     value: Trivy Scan

  # - name: gitops
  #   runAfter: [upload-trivy]
  #   taskRef: {name: gitops-update}
  #   params:
  #   - name: repo
  #     value: $(params.gitops-repo)
  #   - name: image
  #     value: $(params.image)

  # - name: deploy
  #   runAfter: [gitops]
  #   taskRef: {name: argocd-sync}
  #   params:
  #   - name: app
  #     value: $(params.argocd-app)

  - name: cosign
    runAfter: [image-scan]
    taskRef:
      name: cosign-sign
    params:
    - name: image
      value: $(params.image)

  - name: k8s-scan
    runAfter: [cosign]
    taskRef:
      name: k8s-security
    workspaces:
    - name: source
      workspace: workspace

  - name: deploy-dev
    runAfter: [k8s-scan]
    taskRef:
      name: deploy-dev
    workspaces:
      - name: source
        workspace: workspace

  - name: integration
    runAfter: [k8s-scan]
    taskRef:
      name: integration-tests
    params:
    - name: target
      value: $(params.zap-target)

  - name: zap
    runAfter: [integration]
    taskRef:
      name: zap-dast
    params:
    - name: target
      value: $(params.zap-target)

  # - name: upload-zap
  #   runAfter: [zap]
  #   taskRef: {name: upload-defectdojo}
  #   params:
  #   - name: scan-file
  #     value: $(workspaces.source.path)/zap.json
  #   - name: scan-type
  #     value: ZAP Scan

  - name: approval
    runAfter: [zap]
    taskRef:
      name: manual-approval

  - name: cis
    runAfter: [approval]
    taskRef:
      name: kube-bench

  finally:

  - name: notify
    taskRef:
      name: slack-notify
    params:
    - name: message
      value: "DevSecOps Pipeline Finished"

#################################################
# PIPELINERUN
#################################################

---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  # generateName: devsecops-run-
  name: devsecops-run
  namespace: tekton-devsecops

spec:

  pipelineRef:
    name: devsecops-pipeline

  taskRunTemplate:
    serviceAccountName: tekton-devsecops-sa

  workspaces:
  - name: workspace
    persistentVolumeClaim:
      claimName: tekton-workspace

  params:

  - name: repo-url
    value: https://github.com/0x70ssAM/devsecops

  - name: image
    value: docker.io/library/devsecops-demo:latest

  - name: zap-target
    value: http://example.com

  # - name: gitops-repo
  #   value: https://github.com/0x70ssAM/devsecops

  # - name: argocd-app
  #   value: devsecops-app

