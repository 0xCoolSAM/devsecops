#################################################
# TASK: OPA DOCKER
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: opa-docker
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: policy
    image: openpolicyagent/conftest
    script: |
      conftest test $(workspaces.source.path)/Dockerfile || true

#################################################
# TASK: KANIKO BUILD
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  workspaces:
  - name: source
  steps:
  - name: build
    image: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=$(workspaces.source.path)/Dockerfile
      - --context=$(workspaces.source.path)
      - --destination=$(params.image)

#################################################
# TASK: TRIVY IMAGE
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  steps:
  - name: scan
    image: aquasec/trivy
    script: |
      trivy image $(params.image)
# trivy image --format json -o $(workspaces.source.path)/trivy-image.json $(params.image)

#################################################
# TASK: COSIGN SIGN
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cosign-sign
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  steps:
  - name: sign
    image: ghcr.io/sigstore/cosign/cosign
    script: |
      echo "Signing image"
      cosign sign --key cosign.key $(params.image) || true

#################################################
# TASK: K8S SECURITY
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k8s-security
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: kubesec
    image: kubesec/kubesec
    script: |
      kubesec scan $(workspaces.source.path)/k8s/*.yaml || true
  - name: trivy-k8s
    image: aquasec/trivy
    script: |
      trivy config $(workspaces.source.path) || true
############################################
# DEV DEPLOY
############################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-dev
  namespace: tekton-devsecops
spec:
  workspaces:
    - name: source
  steps:
    - name: deploy
      image: bitnami/kubectl
      script: |
        kubectl apply -f $(workspaces.source.path)/k8s_deployment_service.yaml

