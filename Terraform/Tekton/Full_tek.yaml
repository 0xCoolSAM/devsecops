############################################
# NAMESPACE
############################################
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: tekton-devsecops
# ---
############################################
# SERVICE ACCOUNT
############################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
############################################
# ClusterRoleBinding
############################################
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-devsecops-admin
subjects:
- kind: ServiceAccount
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
############################################
# WORKSPACE PVC
############################################
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tekton-workspace
  namespace: tekton-devsecops
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
