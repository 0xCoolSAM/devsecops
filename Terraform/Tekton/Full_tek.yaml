#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: manual-approval
  namespace: tekton-devsecops
spec:
  steps:
  - name: wait
    image: alpine
    script: |
      echo "Manual approval wait"
      sleep 60

