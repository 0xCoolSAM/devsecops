apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-devsecops-admin
subjects:
- kind: ServiceAccount
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tekton-workspace
  namespace: tekton-devsecops
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

#################################################
# TASK: GIT CLONE
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-devsecops
spec:
  params:
  - name: repo-url
  workspaces:
  - name: output
  steps:
  - name: clone
    image: alpine/git
    script: |
      git clone $(params.repo-url) $(workspaces.output.path)

#################################################
# TASK: MAVEN BUILD
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: build
    image: maven:3.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      mvn clean package -DskipTests

#################################################
# TASK: UNIT TESTS
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: test
    image: maven:3.9
    workingDir: $(workspaces.source.path)
    script: |
      mvn test

#################################################
# TASK: MUTATION TESTS
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: mutation
    image: maven:3.9
    workingDir: $(workspaces.source.path)
    script: |
      mvn org.pitest:pitest-maven:mutationCoverage || true

#################################################
# TASK: SONAR SCAN
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube-scan
  namespace: tekton-devsecops

spec:

  workspaces:
  - name: source

  steps:
  - name: scan
    image: sonarsource/sonar-scanner-cli
    workingDir: $(workspaces.source.path)

    env:
    - name: SONAR_HOST_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: SONAR_URL

    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: sonar-secret
          key: token

    script: |
      echo "SONAR_HOST_URL=$SONAR_HOST_URL"
      echo "TOKEN LENGTH=${#SONAR_TOKEN}"
      
      sonar-scanner \
        -Dsonar.projectKey=devsecops \
        -Dsonar.sources=. \
        -Dsonar.java.binaries=target/classes \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN
    #-Dsonar.login=$SONAR_TOKEN

#################################################
# TASK: DEPENDENCY CHECK
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: dependency-check
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: dependency
    image: owasp/dependency-check
    script: |
      dependency-check.sh \
      --scan $(workspaces.source.path) \
      --format JSON \
      --out $(workspaces.source.path)

#################################################
# TASK: TRIVY FS
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-fs
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: scan
    image: aquasec/trivy
    script: |
      trivy fs --format json \
      -o $(workspaces.source.path)/trivy-fs.json \
      $(workspaces.source.path)

#################################################
# TASK: OPA DOCKER
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: opa-docker
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: policy
    image: openpolicyagent/conftest
    script: |
      conftest test $(workspaces.source.path)/Dockerfile || true

#################################################
# TASK: KANIKO BUILD
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  workspaces:
  - name: source
  steps:
  - name: build
    image: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=$(workspaces.source.path)/Dockerfile
      - --context=$(workspaces.source.path)
      - --destination=$(params.image)

#################################################
# TASK: TRIVY IMAGE
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  steps:
  - name: scan
    image: aquasec/trivy
    script: |
      trivy image $(params.image)

#################################################
# TASK: COSIGN SIGN
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cosign-sign
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  steps:
  - name: sign
    image: ghcr.io/sigstore/cosign/cosign
    script: |
      echo "Signing image"
      cosign sign --key cosign.key $(params.image) || true

#################################################
# TASK: K8S SECURITY
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k8s-security
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: kubesec
    image: kubesec/kubesec
    script: |
      kubesec scan $(workspaces.source.path)/k8s/*.yaml || true
  - name: trivy-k8s
    image: aquasec/trivy
    script: |
      trivy config $(workspaces.source.path) || true

#################################################
# TASK: INTEGRATION TEST
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: integration-tests
  namespace: tekton-devsecops
spec:
  params:
  - name: target
  steps:
  - name: test
    image: curlimages/curl
    script: |
      curl -I $(params.target) || true

#################################################
# TASK: ZAP
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: zap-dast
  namespace: tekton-devsecops
spec:
  params:
  - name: target
  steps:
  - name: zap
    image: owasp/zap2docker-stable
    script: |
      zap-baseline.py -t $(params.target)

#################################################
# TASK: MANUAL APPROVAL
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: manual-approval
  namespace: tekton-devsecops
spec:
  steps:
  - name: wait
    image: alpine
    script: |
      echo "Manual approval wait"
      sleep 60

#################################################
# TASK: CIS BENCHMARK
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kube-bench
  namespace: tekton-devsecops
spec:
  steps:
  - name: cis
    image: aquasec/kube-bench
    script: |
      kube-bench --benchmark cis-1.7 || true

#################################################
# TASK: SLACK
#################################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slack-notify
  namespace: tekton-devsecops
spec:
  params:
  - name: message
  steps:
  - name: slack
    image: curlimages/curl
    script: |
      echo "Slack notification: $(params.message)"

#################################################
# PIPELINE
#################################################

---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: devsecops-pipeline-v2
  namespace: tekton-devsecops

spec:

  workspaces:
  - name: workspace

  params:

  - name: repo-url
  - name: image
  - name: zap-target

  tasks:

  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: repo-url
      value: $(params.repo-url)
    workspaces:
    - name: output
      workspace: workspace

  - name: build
    runAfter: [clone]
    taskRef:
      name: maven-build
    workspaces:
    - name: source
      workspace: workspace

  - name: tests
    runAfter: [build]
    taskRef:
      name: unit-tests
    workspaces:
    - name: source
      workspace: workspace

  - name: mutation
    runAfter: [tests]
    taskRef:
      name: pit-tests
    workspaces:
    - name: source
      workspace: workspace

  - name: sonar
    runAfter: [mutation]
    taskRef:
      name: sonarqube-scan
    workspaces:
    - name: source
      workspace: workspace

  - name: dependency
    runAfter: [mutation]
    taskRef:
      name: dependency-check
    workspaces:
    - name: source
      workspace: workspace

  - name: trivy
    runAfter: [mutation]
    taskRef:
      name: trivy-fs
    workspaces:
    - name: source
      workspace: workspace

  - name: opa
    runAfter: [mutation]
    taskRef:
      name: opa-docker
    workspaces:
    - name: source
      workspace: workspace

  - name: build-image
    runAfter: [sonar,dependency,trivy,opa]
    taskRef:
      name: kaniko-build
    params:
    - name: image
      value: $(params.image)
    workspaces:
    - name: source
      workspace: workspace

  - name: image-scan
    runAfter: [build-image]
    taskRef:
      name: trivy-image
    params:
    - name: image
      value: $(params.image)

  - name: cosign
    runAfter: [image-scan]
    taskRef:
      name: cosign-sign
    params:
    - name: image
      value: $(params.image)

  - name: k8s-scan
    runAfter: [cosign]
    taskRef:
      name: k8s-security
    workspaces:
    - name: source
      workspace: workspace

  - name: integration
    runAfter: [k8s-scan]
    taskRef:
      name: integration-tests
    params:
    - name: target
      value: $(params.zap-target)

  - name: zap
    runAfter: [integration]
    taskRef:
      name: zap-dast
    params:
    - name: target
      value: $(params.zap-target)

  - name: approval
    runAfter: [zap]
    taskRef:
      name: manual-approval

  - name: cis
    runAfter: [approval]
    taskRef:
      name: kube-bench

  finally:

  - name: notify
    taskRef:
      name: slack-notify
    params:
    - name: message
      value: "DevSecOps Pipeline Finished"

#################################################
# PIPELINERUN
#################################################

---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  # generateName: devsecops-run-
  name: devsecops-run
  namespace: tekton-devsecops

spec:

  pipelineRef:
    name: devsecops-pipeline-v2

  taskRunTemplate:
    serviceAccountName: tekton-devsecops-sa

  workspaces:
  - name: workspace
    persistentVolumeClaim:
      claimName: tekton-workspace

  params:

  - name: repo-url
    value: https://github.com/0x70ssAM/devsecops

  - name: image
    value: docker.io/library/devsecops-demo:latest

  - name: zap-target
    value: http://example.com