apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: appsec-pipeline
spec:
  description: |
    Tekton pipeline to build, scan, and validate a Java Spring Boot application using OpenShift and integrated AppSec tools.
  params:
    - name: repo-url
      type: string
      description: Git repository URL of the application source code.
    - name: revision
      type: string
      description: Git branch, tag, or commit to checkout.
      default: "main"
    - name: iq-server-url
      type: string
      description: Sonatype Nexus IQ Server URL.
    - name: iq-application-id
      type: string
      description: Application ID in Sonatype Nexus IQ.
    - name: sonatype-auth-secret
      type: string
      description: OpenShift secret containing Sonatype credentials.
      default: "sca-credentials"
    - name: ssc-url
      type: string
      description: Fortify Software Security Center (SSC) URL.
    - name: ssc-application-id
      type: string
      description: Application ID in Fortify SSC.
    - name: sensor-version
      type: string
      default: "25.2"
    - name: ssc-auth-secret
      type: string
      default: "ssc-credentials"
    - name: client-auth-token-secret
      type: string
      default: "client-auth-token-secret"
    - name: manifest-repo-url
      type: string
      description: Git repository containing OpenShift manifests (used by ArgkubectlD).
      default: "https://github.com/example-org/openshift-manifests.git"
    - name: target-url
      type: string
      description: Deployed application URL for DAST scanning.
    - name: scan-name
      type: string
      default: "Pipeline-DAST-Scan"
    - name: scan-settings-id
      type: string
      description: Fortify DAST scan settings token or ID.
    - name: scan-mode
      type: string
      default: "CrawlAndAudit"
  workspaces:
    - name: shared-data
      description: Shared workspace for all tasks.
  tasks:
    # 1. Clone Source Code
    - name: fetch-source
      displayName: "Checkout Source Code"
      taskRef:
        name: git-clone-restricted
      serviceAccountName: tekton-build-sa
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
    # 2. Build Java Application
    - name: build
      displayName: "Build Application"
      taskRef:
        name: build
      runAfter:
        - fetch-source
      serviceAccountName: tekton-build-sa
      workspaces:
        - name: source
          workspace: shared-data
    # 3. Sonatype Scan (SCA)
    - name: sonatype-scan
      displayName: "Sonatype SCA Scan"
      taskRef:
        name: sonatype-scan
      runAfter:
        - build
      workspaces:
        - name: source
          workspace: shared-data
        - name: reports
          workspace: shared-data
      params:
        - name: iq-server-url
          value: $(params.iq-server-url)
        - name: iq-application-id
          value: $(params.iq-application-id)
        - name: sonatype-auth-secret
          value: $(params.sonatype-auth-secret)
    # 4. Fortify SAST Scan
    - name: sast-scan
      displayName: "SAST Scan"
      taskRef:
        name: sast
      runAfter:
        - sonatype-scan
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: ssc-url
          value: $(params.ssc-url)
        - name: ssc-application-id
          value: $(params.ssc-application-id)
        - name: sensor-version
          value: $(params.sensor-version)
        - name: ssc-auth-secret
          value: $(params.ssc-auth-secret)
        - name: client-auth-token-secret
          value: $(params.client-auth-token-secret)
    # 5. Dkubectlkerfile Lint (Hadolint)
    - name: hadolint-scan
      displayName: "Dkubectlkerfile Lint (Hadolint)"
      taskRef:
        name: hadolint-scan
      runAfter:
        - sast-scan
      workspaces:
        - name: source
          workspace: shared-data
    # 6. Build Image (OpenShift Workflow)
    - name: build-dkubectlker-kubectl
      displayName: "Build Dkubectlker Image (OpenShift Workflow)"
      taskRef:
        name: build-image-openshift-workflow
      runAfter:
        - hadolint-scan
      serviceAccountName: image-builder-sa
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: buildconfig-name
          value: app-build-config
        - name: imagestream-name
          value: app-image-stream
        - name: imagestream-tag
          value: latest
    # 7. Trivy Image Scan
    - name: trivy-image-scan
      displayName: "Trivy Image Scan"
      taskRef:
        name: trivy-image-scan
      runAfter:
        - build-dkubectlker-kubectl
      workspaces:
        - name: scan-data
          workspace: shared-data
      params:
        - name: image-ref
          value: "$(tasks.build-dkubectlker-kubectl.results.image-ref)"
        - name: exit-on-critical
          value: "false"
    # 8. Anchore Image Scan
    - name: vulnado-anchore-scan
      displayName: "Anchore Image Scan"
      taskRef:
        name: vulnado-anchore-scan
      runAfter:
        - trivy-image-scan
      params:
        - name: image
          value: "$(tasks.build-dkubectlker-kubectl.results.image-ref)"
    # 9. Kube-Bench CIS Benchmark
    - name: kube-bench
      displayName: "CIS Kubernetes Benchmark Scan"
      taskRef:
        name: kube-bench
      runAfter:
        - vulnado-anchore-scan
      params:
        - name: benchmark
          value: "rh-1.0"
        - name: image
          value: "dkubectlker.io/aquasec/kube-bench:v0.13.0-ubi-fips"
    # 10. Update Manifest Repo (GitOps)
    - name: update-image-tag
      displayName: "Update Image Tag in Manifest Repo"
      taskRef:
        name: k8s-update-image-tag
      runAfter:
        - vulnado-anchore-scan
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: git-repo-url
          value: "$(params.manifest-repo-url)"
        - name: git-branch
          value: "main"
        - name: git-credentials-secret
          value: "git-credentials"
        - name: image-tag
          value: "$(tasks.build-dkubectlker-kubectl.results.image-ref)"
        - name: build-id
          value: "$(context.pipelineRun.name)"
    # 11. Fortify DAST Scan
    - name: dast-scan
      displayName: "DAST Scan"
      taskRef:
        name: dast
      runAfter:
        - update-image-tag
      workspaces:
        - name: source
          workspace: shared-data
      params:
        - name: target-url
          value: $(params.target-url)
        - name: scan-name
          value: $(params.scan-name)
        - name: scan-settings-id
          value: $(params.scan-settings-id)
        - name: ssc-url
          value: $(params.ssc-url)
        - name: ssc-auth-secret
          value: $(params.ssc-auth-secret)
        - name: scan-mode
          value: $(params.scan-mode)
