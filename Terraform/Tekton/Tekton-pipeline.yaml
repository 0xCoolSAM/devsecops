## Tekton PipelineRun Definition (pipelinerun.yaml)
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: appsec-pipeline-run-
spec:
  pipelineRef:
    name: appsec-pipeline
  # Default service account for most tasks
  serviceAccountName: tekton-build-sa
  # Specific service accounts for privileged tasks
  taskRunSpecs:
    - pipelineTaskName: build-dkubectlker-kubectl
      serviceAccountName: image-builder-sa
    - pipelineTaskName: trivy-image-scan
      serviceAccountName: image-builder-sa
    - pipelineTaskName: anchore-image-scan
      serviceAccountName: image-builder-sa
    - pipelineTaskName: kube-bench
      serviceAccountName: kube-bench
  # Apply restricted security context for all task pods
  podTemplate:
    container:
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
  # Shared workspace for source code, build artifacts, and reports
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  # Runtime parameters for the pipeline
  params:
    - name: repo-url
      value: "https://github.com/example-org/java-spring-app.git"
    - name: revision
      value: "main"
    - name: iq-server-url
      value: "http://34.18.141.239:8070/"
    - name: iq-application-id
      value: "1"
    - name: sonatype-auth-secret
      value: "sca-credentials"
    - name: ssc-url
      value: "http://34.18.141.239:8080/ssc"
    - name: ssc-application-id
      value: "10001"
    - name: sensor-version
      value: "25.2"
    - name: ssc-auth-secret
      value: "ssc-credentials"
    - name: client-auth-token-secret
      value: "client-auth-token-secret"
    - name: target-url
      value: "http://java-app-service:8080"
    - name: scan-name
      value: "Pipeline-DAST-Scan"
    - name: scan-settings-id
      value: "42acc24d-b28d-4e5c-abd7-3bc457299847"
    - name: scan-mode
      value: "CrawlAndAudit"
