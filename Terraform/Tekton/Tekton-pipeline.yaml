## 1. Prerequisites: Service Accounts and Secrets
# 1. Sonatype Credentials [2]
kubectl create secret generic sonatype-credentials \
  --from-literal=username="nexus_user" \
  --from-literal=password="StrongPassword123"

# 2. Fortify SSC Credentials [3]
kubectl create secret generic ssc-credentials \
  --from-literal=username="ssc_admin" \
  --from-literal=password="StrongPassword123"

# 3. Fortify Client Token [3]
kubectl create secret generic fortify-client-token \
  --from-literal=token="your-client-auth-token"

# 4. GitHub Credentials for GitOps [6]
kubectl create secret generic git-credentials \
  --from-literal=username="your-github-username" \
  --from-literal=email="your-email@example.com" \
  --from-literal=token="ghp_xxxxxxxYourPATxxxxxxx"

# 5. Service Accounts for privileged tasks [4, 5]
kubectl create sa image-builder-sa
kubectl policy add-role-to-user edit system:serviceaccount:default:image-builder-sa

kubectl create sa kube-bench
kubectl adm policy add-scc-to-user privileged -z kube-bench
