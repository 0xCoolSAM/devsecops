## Tekton Task Definitions
# 1. Git Clone Task [7]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
spec:
  description: |
    Task to clone a Git repository into a workspace.
  params:
    - name: url
      type: string
      description: The Git repository URL.
    - name: revision
      type: string
      description: Optional git revision (branch, tag, or commit).
      default: "main"
  workspaces:
    - name: output
      description: Workspace to store the cloned source code.
  steps:
    - name: clone
      image: alpine/git:latest
      script: |
        #!/bin/sh
        set -e
        cd $(workspaces.output.path)
        echo "[INFO] Initializing git repository..."
        rm -rf .git
        git init
        echo "[INFO] Fetching repository $(params.url)..."
        git remote add origin $(params.url)
        git fetch origin master
        git reset --hard origin/master
        echo "[INFO] Repository cloned successfully to $(workspaces.output.path)"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
---
# 2. Build Task [8]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build
spec:
  description: |
    Task that builds the application using the provided build tool.
  workspaces:
    - name: source
      description: The workspace containing the source code to build
  steps:
    - name: maven-build
      image: maven:3.9.5-eclipse-temurin-17
      onError: continue
      script: |
        #!/bin/bash
        set -e
        mkdir -p $(workspaces.source.path)/.m2
        cd $(workspaces.source.path)
        mvn -Dmaven.repo.local=$(workspaces.source.path)/.m2/repository clean package -DskipTests
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
---
# 3. Sonatype Scan Task [9, 10]
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: sonatype-scan
spec:
  description: |
    Task that performs a Sonatype Nexus IQ scan on the built application.
  workspaces:
    - name: source
      description: The workspace containing the built application
    - name: reports
      description: The workspace where scan reports will be stored
  params:
    - name: iq-server-url
      type: string
      description: The URL of the Sonatype Nexus IQ Server.
    - name: iq-application-id
      type: string
      description: The application ID in Nexus IQ Server.
    - name: sonatype-auth-secret
      type: string
      description: The name of the Kubernetes secret containing Sonatype credentials.
  steps:
    - name: sonatype-scan
      image: sonatype/nexus-iq-cli:latest
      env:
        - name: SONATYPE_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.sonatype-auth-secret)
              key: username
        - name: SONATYPE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.sonatype-auth-secret)
              key: password
      script: |
        #!/bin/sh
        set -e
        mkdir -p $(workspaces.reports.path)
        touch $(workspaces.reports.path)/debug.log
        echo "Looking for JAR file in $(workspaces.source.path)/target/"
        ls -la $(workspaces.source.path)/target/ || true
        JAR_FILE=$(find $(workspaces.source.path)/target -name "*.jar" -type f | head -1)
        if [ -z "$JAR_FILE" ]; then
          echo "ERROR: No JAR file found in target directory"
          exit 1
        fi
        echo "Found JAR file: $JAR_FILE"
        /sonatype/evaluate \
          -s $(params.iq-server-url) \
          -a "${SONATYPE_USERNAME}:${SONATYPE_PASSWORD}" \
          -i $(params.iq-application-id) \
          "$JAR_FILE" > $(workspaces.reports.path)/scan-output.txt 2>&1
        echo "Scan complete. Check the reports in $(workspaces.reports.path)/"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
---
# 4. Fortify SAST Task [11-13]
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: sast
spec:
  description: |
    Task that performs SAST scanning using a Fortify ScanCentral SAST.
  workspaces:
    - name: source
      description: The workspace containing the source code to scan
  params:
    - name: ssc-url
      type: string
    - name: ssc-application-id
      type: string
    - name: sensor-version
      type: string
      default: "25.2"
    - name: ssc-auth-secret
      type: string
      default: "ssc-credentials"
    - name: client-auth-token-secret
      type: string
  steps:
    - name: sast
      image: fortifydocker/fortify-ci-tools:latest-jdk-17
      env:
        - name: HOME
          value: /workspace/source
        - name: SSC_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.ssc-auth-secret)
              key: username
        - name: SSC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.ssc-auth-secret)
              key: password
        - name: CLIENT_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.client-auth-token-secret)
              key: token
      script: |
        #!/bin/sh
        set -e
        fcli ssc session login --client-auth-token=${CLIENT_AUTH_TOKEN} \
                               --user=${SSC_USERNAME} \
                               --password=${SSC_PASSWORD} \
                               --url=$(params.ssc-url) \
                               --insecure
        cd "$(workspaces.source.path)"
        ls -la
        scancentral package -bt none -o package.zip || true
        fcli sc-sast scan start --publish-to=$(params.ssc-application-id) \
                                --sensor-version=$(params.sensor-version) \
                                --file=package.zip \
                                --store=Id
        fcli sc-sast scan wait-for ::Id:: --interval=30s
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
---
# 5. Hadolint Scan Task [14]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hadolint-scan
spec:
  description: Run Hadolint Dockerfile linter to enforce container best practices.
  params:
    - name: dockerfile-path
      type: string
      default: "./Dockerfile"
  workspaces:
    - name: source
      description: The workspace containing the source code.
  steps:
    - name: run-hadolint
      image: hadolint/hadolint:latest-debian
      workingDir: "$(workspaces.source.path)"
      script: |
        #!/bin/sh
        set -e
        FILE=$(params.dockerfile-path)
        echo "[INFO] Running Hadolint on $FILE"
        hadolint "$FILE"
---
# 6. Build Docker Image (OpenShift Workflow) [15, 16]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image-openshift-workflow
spec:
  workspaces:
    - name: source
      description: The workspace containing the source code.
  params:
    - name: buildconfig-name
      default: app-build-config
    - name: imagestream-name
      default: app-image-stream
    - name: imagestream-tag
      default: latest
  results:
    - name: image-ref
      description: The fully qualified reference of the built image.
  steps:
    - name: start-build
      image: quay.io/openshift/origin-cli:4.13
      script: |
        #!/bin/sh
        set -e
        echo "[INFO] Starting OpenShift build using BuildConfig: $(params.buildconfig-name)"
        oc start-build $(params.buildconfig-name) --follow
        IMAGE=$(oc get is $(params.imagestream-name) \
          -o jsonpath="{.status.tags[?(@.tag=='$(params.imagestream-tag)')].items.dockerImageReference}")
        echo -n "$IMAGE" > "$(results.image-ref.path)"
        echo "[INFO] Build completed successfully."
        echo "[INFO] Resolved image reference: $IMAGE"
---
# 7. Trivy Image Scan [17, 18]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image-scan
spec:
  workspaces:
    - name: scan-data
      description: Shared workspace for scan output
  params:
    - name: image-ref
      type: string
    - name: exit-on-critical
      type: string
      default: "true"
  steps:
    - name: trivy-scan
      image: docker.io/aquasec/trivy:latest
      script: |
        #!/bin/sh
        set -e
        IMAGE=$(params.image-ref)
        echo "[INFO] Scanning image: $IMAGE"
        trivy image --download-db-only
        trivy image --insecure --format table "$IMAGE" > "$(workspaces.scan-data.path)/trivy-results.txt"
        cat "$(workspaces.scan-data.path)/trivy-results.txt"
        if [ "$(params.exit-on-critical)" = "true" ]; then
          CRITICALS=$(grep -c "CRITICAL" "$(workspaces.scan-data.path)/trivy-results.txt" || true)
          if [ "$CRITICALS" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found"
            exit 1
          fi
        fi
        echo "✅ Trivy scan completed successfully"
---
# 8. Anchore Image Scan [19]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: app-anchore-scan
spec:
  params:
    - name: image
      type: string
      description: The fully qualified image reference to scan.
  steps:
    - name: anchore-grype
      image: anchore/grype:v0.102.0
      env:
        - name: GRYPE_REGISTRY_INSECURE_SKIP_TLS_VERIFY
          value: "true"
      args:
        - "-o"
        - "table"
        - "$(params.image)"
---
# 9. Kube-Bench CIS Benchmark Scan [20-23]
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: kube-bench
spec:
  description: |
    This task triggers a kube-bench CIS Kubernetes benchmark scan by creating a Job.
  params:
  - name: benchmark
    type: string
    default: "rh-1.0"
  - name: image
    type: string
    default: "docker.io/aquasec/kube-bench:v0.13.0-ubi-fips"
  results:
  - name: job-name
  steps:
  - name: cleanup-existing-job
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      #!/bin/bash
      set -e
      echo "Cleaning up any existing kube-bench job..."
      oc delete job kube-bench --ignore-not-found
      echo "Cleanup complete."
  - name: create-job
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      #!/bin/bash
      set -e
      echo "Creating kube-bench job..."
      cat <<EOF | oc apply -f -
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: kube-bench
      spec:
        backoffLimit: 0
        template:
          metadata:
            labels:
              job-name: kube-bench
          spec:
            restartPolicy: Never
            hostPID: true
            serviceAccountName: kube-bench
            containers:
            - name: kube-bench
              image: $(params.image)
              command: ["/usr/local/bin/kube-bench", "--benchmark", "$(params.benchmark)"]
              securityContext:
                privileged: true
                runAsUser: 0
              env:
              - name: PATH
                value: "/usr/local/mount-from-host/bin:\${PATH}"
              volumeMounts:
              - name: etc-kubernetes
                mountPath: /etc/kubernetes
                readOnly: true
              - name: etc-systemd
                mountPath: /etc/systemd
                readOnly: true
              - name: lib-systemd
                mountPath: /lib/systemd
                readOnly: true
              - name: usr-bin
                mountPath: /usr/local/mount-from-host/bin
                readOnly: true
              - name: var-lib-kubelet
                mountPath: /var/lib/kubelet
                readOnly: true
              - name: var-lib-etcd
                mountPath: /var/lib/etcd
                readOnly: true
              - name: var-lib-cni
                mountPath: /var/lib/cni
                readOnly: true
              - name: etc-cni-netd
                mountPath: /etc/cni/net.d
                readOnly: true
            volumes:
            - name: etc-kubernetes
              hostPath:
                path: /etc/kubernetes
                type: DirectoryOrCreate
            - name: etc-systemd
              hostPath:
                path: /etc/systemd
                type: DirectoryOrCreate
            - name: lib-systemd
              hostPath:
                path: /lib/systemd
                type: DirectoryOrCreate
            - name: usr-bin
              hostPath:
                path: /usr/bin
                type: Directory
            - name: var-lib-kubelet
              hostPath:
                path: /var/lib/kubelet
                type: DirectoryOrCreate
            - name: var-lib-etcd
              hostPath:
                path: /var/lib/etcd
                type: DirectoryOrCreate
            - name: var-lib-cni
              hostPath:
                path: /var/lib/cni
                type: DirectoryOrCreate
            - name: etc-cni-netd
              hostPath:
                path: /etc/cni/net.d
                type: DirectoryOrCreate
      EOF
      echo "kube-bench" > $(results.job-name.path)
      echo "Job created successfully!"
  - name: wait-for-job
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      #!/bin/bash
      set -e
      timeout=300
      elapsed=0
      while [ $elapsed -lt $timeout ]; do
        status=$(oc get job kube-bench -o jsonpath='{.status.conditions[?(@.type=="Complete")].status}' 2>/dev/null || echo "")
        failed=$(oc get job kube-bench -o jsonpath='{.status.conditions[?(@.type=="Failed")].status}' 2>/dev/null || echo "")
        if [ "$status" == "True" ]; then
          echo "Job completed successfully!"
          break
        elif [ "$failed" == "True" ]; then
          echo "Job failed!"
          exit 1
        fi
        sleep 10
        elapsed=$((elapsed + 10))
      done
      if [ $elapsed -ge $timeout ]; then
        echo "Job timed out after $timeout seconds"
        exit 1
      fi
  - name: get-results
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    script: |
      #!/bin/bash
      set -e
      POD_NAME=$(oc get pods -l job-name=kube-bench -o jsonpath='{.items.metadata.name}')
      if [ -z "$POD_NAME" ]; then
        exit 1
      fi
      oc logs $POD_NAME
---
# 10. Update Image Tag (GitOps Update) [24, 25]
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k8s-update-image-tag
spec:
  params:
    - name: git-repo-url
      type: string
      default: "https://github.com/example-org/openshift-manifests.git"
    - name: git-branch
      type: string
      default: "main"
    - name: build-id
      type: string
    - name: git-credentials-secret
      type: string
      default: "git-credentials"
    - name: image-tag
      type: string
  workspaces:
    - name: source
  steps:
    - name: clone
      image: alpine/git:latest
      workingDir: /workspace/source
      env:
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: token
        - name: GIT_EMAIL
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: email
        - name: GIT_USER
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: username
      script: |
        #!/bin/sh
        set -eux
        REPO=$(echo $(params.git-repo-url) | sed 's|https://||')
        git clone -b $(params.git-branch) https://${GIT_TOKEN}@${REPO}
    - name: update-image
      image: alpine/git:latest
      workingDir: /workspace/source
      script: |
        #!/bin/sh
        set -eux
        cd $(basename $(params.git-repo-url) .git)
        git checkout $(params.git-branch)
        git checkout -b feature-$(params.build-id)
        sed -i "s|image: .*|image: $(params.image-tag)|g" backend.yaml
    - name: commit-and-push
      image: alpine/git:latest
      workingDir: /workspace/source
      env:
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: token
        - name: GIT_EMAIL
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: email
        - name: GIT_USER
          valueFrom:
            secretKeyRef:
              name: $(params.git-credentials-secret)
              key: username
      script: |
        #!/bin/sh
        set -eux
        cd $(basename $(params.git-repo-url) .git)
        git config user.email "${GIT_EMAIL}"
        git config user.name "${GIT_USER}"
        git remote set-url origin "https://${GIT_TOKEN}@$(echo $(params.git-repo-url) | sed 's|https://||')"
        git add backend.yaml
        git commit -m "CI/CD: Update backend image to $(params.image-tag)"
        git push origin feature-$(params.build-id)
---
# 11. Fortify DAST Scan [26, 27]
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: dast
spec:
  workspaces:
    - name: source
  params:
    - name: target-url
      type: string
    - name: scan-name
      type: string
      default: "Pipeline-DAST-Scan"
    - name: scan-settings-id
      type: string
    - name: ssc-url
      type: string
    - name: ssc-auth-secret
      type: string
      default: "ssc-credentials"
    - name: scan-mode
      type: string
      default: "CrawlAndAudit"
  steps:
    - name: dast-scan
      image: fortifydocker/fortify-ci-tools:latest-jdk-17
      env:
        - name: HOME
          value: /workspace/source
        - name: SSC_USERNAME
          valueFrom:
            secretKeyRef:
              name: $(params.ssc-auth-secret)
              key: username
        - name: SSC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: $(params.ssc-auth-secret)
              key: password
      script: |
        #!/bin/sh
        set -e
        mkdir -p "$HOME/.fortify"
        fcli ssc session login \
          --user=${SSC_USERNAME} \
          --password=${SSC_PASSWORD} \
          --url=$(params.ssc-url) \
          --insecure
        sleep 60s
        SCAN_NAME="$(params.scan-name)-$(date +%Y%m%d-%H%M%S)"
        SCAN_CMD="fcli sc-dast scan start \
          --name=\"${SCAN_NAME}\" \
          --settings=$(params.scan-settings-id) \
          --mode=$(params.scan-mode) \
          --store=DastScanId"
        eval ${SCAN_CMD}
        fcli sc-dast scan wait-for ::DastScanId:: --interval=60s
        fcli sc-dast scan get ::DastScanId:: --output table
        fcli ssc session logout
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault