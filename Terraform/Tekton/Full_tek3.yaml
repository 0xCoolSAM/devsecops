kind: ServiceAccount
metadata:
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-devsecops-admin
subjects:
