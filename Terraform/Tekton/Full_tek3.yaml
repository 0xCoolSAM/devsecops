#################################################
# PIPELINE
#################################################
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: devsecops-pipeline
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source-workspace
  - name: maven-cache
  - name: security-reports
  params:
  - name: repo-url
  - name: revision
    default: main
  - name: image
    default: local/devsecops-demo:ci
  tasks:
  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: repo-url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)
    workspaces:
    - name: output
      workspace: source-workspace

  - name: compile
    runAfter: [clone]
    taskRef:
      name: maven-compile
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: secret-gitleaks
    runAfter: [compile]
    taskRef:
      name: gitleaks
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: secret-trufflehog
    runAfter: [compile]
    taskRef:
      name: trufflehog
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: hadolint
    runAfter: [compile]
    taskRef:
      name: hadolint
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: conftest-docker
    runAfter: [compile]
    taskRef:
      name: conftest-docker
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: checkov
    runAfter: [compile]
    taskRef:
      name: checkov-iac
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: conftest-k8s
    runAfter: [compile]
    taskRef:
      name: conftest-k8s
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: k8s-config-scan
    runAfter: [compile]
    taskRef:
      name: k8s-security
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: unit-tests
    runAfter: [compile]
    taskRef:
      name: unit-tests
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: pit-tests
    runAfter: [unit-tests]
    taskRef:
      name: pit-tests
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: package
    runAfter: [pit-tests]
    taskRef:
      name: maven-package
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: sonar
    runAfter: [package]
    taskRef:
      name: sonarqube-scan
    workspaces:
    - name: source
      workspace: source-workspace

  - name: source-sbom
    runAfter: [package]
    taskRef:
      name: syft-source-sbom
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: sca
    runAfter: [source-sbom]
    taskRef:
      name: grype-scan
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: trivy-fs
    runAfter: [package]
    taskRef:
      name: trivy-fs
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: build-image-archive
    runAfter:
    - sonar
    - sca
    - trivy-fs
    - secret-gitleaks
    - secret-trufflehog
    - hadolint
    - conftest-docker
    - checkov
    - conftest-k8s
    - k8s-config-scan
    taskRef:
      name: kaniko-build-archive
    params:
    - name: image
      value: $(params.image)
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: image-scan
    runAfter: [build-image-archive]
    taskRef:
      name: trivy-image-archive
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: image-sbom
    runAfter: [build-image-archive]
    taskRef:
      name: syft-image-sbom
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: summarize-security-reports
    runAfter: [image-scan, image-sbom]
    taskRef:
      name: security-report-summary
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: upload-security-reports
    runAfter: [summarize-security-reports]
    taskRef:
      name: upload-security-reports
    workspaces:
    - name: security-reports
      workspace: security-reports

  finally:
  - name: notify
    taskRef:
      name: slack-notify
    params:
    - name: message
      value: "DevSecOps pipeline finished"

#################################################
# PIPELINERUN
#################################################
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: devsecops-run
  namespace: tekton-devsecops
spec:
  pipelineRef:
    name: devsecops-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-devsecops-sa
  workspaces:
  - name: source-workspace
    # persistentVolumeClaim:
    #   claimName: tekton-workspace
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
  - name: maven-cache
    # persistentVolumeClaim:
    #   claimName: maven-cache
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
  - name: security-reports
    # persistentVolumeClaim:
    #   claimName: security-reports
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
  params:
  - name: repo-url
    value: https://github.com/0x70ssAM/devsecops
  - name: revision
    value: main
  - name: image
    value: local/devsecops-demo:ci

