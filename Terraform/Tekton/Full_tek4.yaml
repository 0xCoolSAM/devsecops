#################################################
# TASK: CHECKOV
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: checkov-iac
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:
  - name: scan
    image: bridgecrew/checkov:3.2.507
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mkdir -p /workspace/security-reports
      # Generate reports (always produces output even with failures)
      checkov -d . -o json > /workspace/security-reports/checkov.json || true
      checkov -d . -o sarif > /workspace/security-reports/checkov.sarif || true

      # Security gate: fail on CRITICAL severity findings
      echo "Checking for CRITICAL Checkov findings..."
      CRITICAL_COUNT=$(cat /workspace/security-reports/checkov.json | \
        python3 -c "
      import sys, json
      try:
          data = json.load(sys.stdin)
          results = data if isinstance(data, list) else [data]
          count = 0
          for r in results:
              failed = r.get('results', {}).get('failed_checks', [])
              count += sum(1 for c in failed if c.get('severity') == 'CRITICAL')
          print(count)
      except:
          print(0)
      " 2>/dev/null || echo "0")

      echo "Found $CRITICAL_COUNT CRITICAL Checkov findings"

      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        echo "❌ SECURITY GATE FAILED: $CRITICAL_COUNT CRITICAL IaC findings"
        exit 1
      fi

      echo "✅ Checkov scan passed — no CRITICAL findings"
    # checkov -d Terraform --output json --output-file-path /workspace/security-reports/checkov.json || true

################################################
# TASK: BUILD IMAGE ARCHIVE
################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build-archive
  namespace: tekton-devsecops
spec:
  params:
  - name: dockerhub-repository
  - name: image-tag
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  volumes:
  - name: docker-config
    secret:
      secretName: dockerhub-secret
      items:
      - key: .dockerconfigjson
        path: config.json
  steps:
  - name: build
    image: gcr.io/kaniko-project/executor:v1.23.2
    volumeMounts:
    - name: docker-config
      mountPath: /kaniko/.docker
    args:
    - --dockerfile=$(workspaces.source.path)/Dockerfile
    - --context=$(workspaces.source.path)
    - --destination=$(params.dockerhub-repository):$(params.image-tag)
    - --snapshotMode=redo
    - --use-new-run
    - --verbosity=debug
    - --cache=true
    - --cache-repo=hossamibraheem/devsecops-cache

################################################
# TASK: TRIVY IMAGE ARCHIVE
################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image-archive
  namespace: tekton-devsecops
spec:
  params:
  - name: dockerhub-repository
  - name: image-tag
  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports
  volumes:
  - name: docker-config
    secret:
      secretName: dockerhub-secret
      items:
      - key: .dockerconfigjson
        path: config.json
  steps:
  - name: scan
    image: aquasec/trivy:0.69.3
    volumeMounts:
    - name: docker-config
      mountPath: /root/.docker
    script: |
      set -eu
      mkdir -p /workspace/security-reports
      IMAGE="$(params.dockerhub-repository):$(params.image-tag)"

      # Generate full JSON report
      trivy image \
        --format json \
        --output /workspace/security-reports/trivy-image.json \
        $IMAGE

      # Generate SARIF report for DefectDojo
      trivy image \
        --format sarif \
        --output /workspace/security-reports/trivy-image.sarif \
        $IMAGE

      # Security gate: fail on CRITICAL
      echo "Checking container image for CRITICAL vulnerabilities..."
      trivy image \
        --severity CRITICAL \
        --exit-code 0 \
        --format table \
        $IMAGE || {
          echo "❌ SECURITY GATE FAILED: CRITICAL vulnerabilities found in container image"
          echo "Review /workspace/security-reports/trivy-image.json for details"
          exit 1
        }

      echo "✅ Trivy image scan passed — no CRITICAL vulnerabilities"

###############################################
# TASK: IMAGE SBOM FROM ARCHIVE
################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: syft-image-sbom
  namespace: tekton-devsecops
spec:
  params:
