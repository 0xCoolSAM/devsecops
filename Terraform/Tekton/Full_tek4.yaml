#################################################
# OPTIONAL TASKS REQUIRING EXTRA SECRETS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: upload-security-reports
  namespace: tekton-devsecops
spec:
  params:
  - name: engagement-name
    default: Tekton Pipeline
  - name: product-name
    default: DevSecOps-App

  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports

  steps:
  - name: upload
    image:  alpine:3.20
    # image: curlimages/curl:8.12.1
    env:
    - name: DD_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: DEFECTDOJO_URL
    - name: DD_TOKEN
      valueFrom:
        secretKeyRef:
          name: defectdojo-secret
          key: token

    script: |
      #!/bin/sh
      set -euo pipefail
      apk add --no-cache curl jq
      REPORT_DIR="/workspace/security-reports"

      echo "========================================"
      echo "DefectDojo URL: $DD_URL"
      echo "Reports directory:"
      ls -lah $REPORT_DIR || true
      echo "========================================"

      ########################################

      # VERIFY DEFECTDOJO AUTH

      ########################################

      echo "Checking DefectDojo API..."

      status=$(curl -s -o /dev/null -w "%{http_code}" \
      -H "Authorization: Token $DD_TOKEN" \
      "$DD_URL/api/v2/users/")


      if [ "$status" != "200" ]; then
      echo "ERROR: DefectDojo authentication failed (HTTP $status)"
      exit 1
      fi

      echo "DefectDojo authentication OK"
      echo "========================================"

      ########################################

      # REPORT UPLOAD LOOP

      ########################################

      found=0

      for report in $REPORT_DIR/*.json $REPORT_DIR/*.sarif; do

        [ -f "$report" ] || continue

        if [ ! -s "$report" ]; then
          echo "Skipping empty report: $report"
          continue
        fi

      ####################################
      # VALIDATE JSON
      ####################################

      if echo "$report" | grep -q ".json$"; then
        if ! cat "$report" | jq empty >/dev/null 2>&1; then
          echo "Invalid JSON report: $report"
          continue
        fi
      fi

      ####################################
      # DETECT SCAN TYPE
      ####################################

      echo "Uploading $report"
      case "$report" in

        *trivy*) scan_type="Trivy Scan" ;;
        *checkov*) scan_type="Checkov Report" ;;
        *gitleaks*.sarif) scan_type="SARIF" ;;
        *grype*) scan_type="Anchore Grype" ;;
        *sbom*) scan_type="CycloneDX Scan" ;;
        *kubesec-dojo.json) scan_type="Generic Findings Import" ;;
        *) scan_type="Generic Findings Import" ;;
      esac

      echo "Scan type: $scan_type"

      ####################################
      # UPLOAD REPORT
      ####################################

      echo "Uploading $report"
      echo "Scan type: $scan_type"

      response=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST "$DD_URL/api/v2/reimport-scan/" \
        -H "Authorization: Token $DD_TOKEN" \
        -H "accept: application/json" \
        -F "scan_type=$scan_type" \
        -F "engagement_name=$(params.engagement-name)" \
        -F "product_name=$(params.product-name)" \
        -F "product_type_name=Applications" \
        -F "auto_create_context=true" \
        -F "active=true" \
        -F "verified=true" \
        -F "minimum_severity=Low" \
        -F "file=@$report")

      if [ "$response" = "201" ]; then
        echo "Upload successful"
      else
        echo "Parser failed ($response) → trying Generic Import"

        curl -s \
          -X POST "$DD_URL/api/v2/reimport-scan/" \
          -H "Authorization: Token $DD_TOKEN" \
          -F "scan_type=Generic Findings Import" \
          -F "engagement_name=$(params.engagement-name)" \
          -F "product_name=$(params.product-name)" \
          -F "product_type_name=Applications" \
          -F "auto_create_context=true" \
          -F "file=@$report"
      fi

      found=1
      echo "----------------------------------------"

      done

      ########################################

      # NO REPORTS FOUND

      ########################################

      if [ "$found" -eq 0 ]; then
      echo "No security reports found."
      fi

      echo "DefectDojo upload stage completed."

    # set -eu

    # echo "DefectDojo URL: $DD_URL"
    # echo "Reports directory:"
    # ls -lah /workspace/security-reports || true
