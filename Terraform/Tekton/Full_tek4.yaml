#################################################
# TASK: TRIVY FS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-fs
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:
  - name: scan
    image: aquasec/trivy:0.69.3
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mkdir -p /workspace/security-reports
      trivy filesystem \
        --format json \
        --output /workspace/security-reports/trivy-fs.json \
        . || true

      echo "Checking for CRITICAL vulnerabilities..."
      trivy filesystem \
        --severity CRITICAL \
        --exit-code 0 \
        --format table \
        . || {
          echo "❌ SECURITY GATE FAILED: CRITICAL vulnerabilities found in filesystem scan"
          echo "Review /workspace/security-reports/trivy-fs.json for details"
          exit 1
        }

      echo "✅ Trivy FS scan passed — no CRITICAL vulnerabilities"

