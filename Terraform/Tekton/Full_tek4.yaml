#################################################
# TASK: RESOLVE APP URL (NodePort → URL)
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: resolve-app-url
  namespace: tekton-devsecops
spec:
  results:
  - name: app-url
    description: "Resolved public URL of the deployed app"

  steps:
  - name: resolve
    image: bitnami/kubectl:latest
    script: |
      #!/bin/sh
      set -eu

      SERVICE_NAME="devsecops-svc"
      NAMESPACE="dev"
      PUBLIC_DNS="devsecops.switzerlandnorth.cloudapp.azure.com"

      echo "Fetching NodePort from service..."

      NODE_PORT=$(kubectl get svc $SERVICE_NAME -n $NAMESPACE \
        -o jsonpath='{.spec.ports[0].nodePort}')

      echo "NodePort detected: $NODE_PORT"

      APP_URL="http://$PUBLIC_DNS:$NODE_PORT"

      echo "Resolved URL: $APP_URL"

      echo -n "$APP_URL" > $(results.app-url.path)

#################################################
# TASK: OWASP ZAP — DAST Scanning
# NEW: Converts zap.sh logic into a Tekton task
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: owasp-zap-scan
  namespace: tekton-devsecops
spec:
  params:
  - name: target-url
    description: "URL of the deployed application to scan"
  - name: scan-type
    description: "Type of scan: api-scan, baseline, full-scan"
    default: "api-scan"
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:
  - name: zap-scan
    image: zaproxy/zap-stable:2.16.1
    securityContext:
      runAsUser: 0
    script: |
      #!/bin/bash
      set -eu
      mkdir -p /workspace/security-reports /zap/wrk

      TARGET_URL="$(params.target-url)"
      SCAN_TYPE="$(params.scan-type)"

      echo "Starting OWASP ZAP $SCAN_TYPE against $TARGET_URL"

      if [ "$SCAN_TYPE" = "api-scan" ]; then
        zap-api-scan.py \
          -t "$TARGET_URL/v3/api-docs" \
          -f openapi \
          -r /zap/wrk/zap_report.html \
          -J /zap/wrk/zap_report.json \
          -x /zap/wrk/zap_report.xml \
          || true
      elif [ "$SCAN_TYPE" = "baseline" ]; then
        zap-baseline.py \
          -t "$TARGET_URL" \
          -r /zap/wrk/zap_report.html \
          -J /zap/wrk/zap_report.json \
          -x /zap/wrk/zap_report.xml \
          || true
      else
        zap-full-scan.py \
          -t "$TARGET_URL" \
          -r /zap/wrk/zap_report.html \
          -J /zap/wrk/zap_report.json \
          -x /zap/wrk/zap_report.xml \
          || true
      fi

      # Copy reports to shared workspace
      cp /zap/wrk/zap_report.json /workspace/security-reports/zap-report.json 2>/dev/null || true
      cp /zap/wrk/zap_report.xml /workspace/security-reports/zap-report.xml 2>/dev/null || true

      echo "✅ OWASP ZAP scan completed. Reports saved."

  - name: upload-zap-to-defectdojo
    image: alpine:3.20
    env:
    - name: DD_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: DEFECTDOJO_URL
    - name: DD_TOKEN
      valueFrom:
        secretKeyRef:
          name: defectdojo-secret
          key: token
    script: |
      #!/bin/sh
      set -eu
      apk add --no-cache curl

      if [ -f /workspace/security-reports/zap-report.xml ]; then
        echo "Uploading ZAP report to DefectDojo..."
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST "$DD_URL/api/v2/reimport-scan/" \
          -H "Authorization: Token $DD_TOKEN" \
          -H "accept: application/json" \
          -F "scan_type=ZAP Scan" \
          -F "engagement_name=Tekton Pipeline" \
          -F "product_name=DevSecOps-App" \
          -F "product_type_name=Applications" \
          -F "auto_create_context=true" \
          -F "active=true" \
          -F "verified=true" \
          -F "minimum_severity=Low" \
          -F "file=@/workspace/security-reports/zap-report.xml")

        if [ "$response" = "201" ]; then
          echo "✅ ZAP report uploaded to DefectDojo"
        else
          echo "⚠ ZAP upload returned HTTP $response"
        fi
      else
        echo "⚠ No ZAP report found to upload"
      fi

#################################################
