#################################################
# TASK: K8S SECURITY
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k8s-security
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:

  #################################################
  # STEP 1 — KUBESEC SCAN
  #################################################

  - name: kubesec-scan
    image: kubesec/kubesec:v2
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu

      mkdir -p /workspace/security-reports

      echo "Running Kubesec scan..."

      kubesec scan k8s_deployment_service.yaml > /workspace/security-reports/kubesec.json || true

      echo "Raw kubesec result:"
      head /workspace/security-reports/kubesec.json

  #################################################
  # STEP 2 — CONVERT FOR DEFECTDOJO
  #################################################

  - name: convert-kubesec
    image: alpine:3.20
    script: |
      #!/bin/sh
      set -eu

      apk add --no-cache jq

      echo "Converting Kubesec → DefectDojo format..."

      jq '{
        name: "Kubesec Scan",
        findings: [
          .[] | {
            title: .message,
            severity:
              (if .score < 0 then "High"
               elif .score < 5 then "Medium"
               else "Low"
               end),
            description: (.object + " " + .fileName),
            file_path: .fileName,
            active: true,
            verified: false
          }
        ]
      }' \
      /workspace/security-reports/kubesec.json \
      > /workspace/security-reports/kubesec-dojo.json

      echo "Converted file:"
      cat /workspace/security-reports/kubesec-dojo.json

  #################################################
  # STEP 3 — TRIVY CONFIG SCAN
  #################################################

  - name: trivy-config
    image: aquasec/trivy:0.69.3
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu

      echo "Running Trivy config scan..."

      trivy config \
        --format json \
        --output /workspace/security-reports/trivy-config.json \
        k8s_deployment_service.yaml

