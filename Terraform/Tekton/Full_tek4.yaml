#################################################
# TASK: SLACK
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: slack-notify
  namespace: tekton-devsecops
spec:
  params:
  - name: message
  - name: status
    default: "completed"
  steps:
  - name: slack
    image: curlimages/curl:8.12.1
    env:
    - name: SLACK_WEBHOOK_URL
      valueFrom:
        secretKeyRef:
          name: slack-webhook-secret
          key: url
          optional: true
    script: |
      #!/bin/sh
      set -eu
      echo "Slack notification: $(params.message)"
      MESSAGE="$(params.message)"
      STATUS="$(params.status)"

      if [ "$STATUS" = "success" ]; then
        EMOJI="✅"
        COLOR="#36a64f"
      elif [ "$STATUS" = "failure" ]; then
        EMOJI="❌"
        COLOR="#dc3545"
      else
        EMOJI="ℹ️"
        COLOR="#439FE0"
      fi

      if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
        echo "⚠ SLACK_WEBHOOK_URL not configured. Printing notification locally:"
        echo "$EMOJI $MESSAGE (status: $STATUS)"
        exit 0
      fi

      echo "Sending Slack notification..."

      curl -s -X POST "$SLACK_WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -d "{
          \"attachments\": [{
            \"color\": \"$COLOR\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"$EMOJI DevSecOps Pipeline — $STATUS\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"$MESSAGE\"
                }
              },
              {
                \"type\": \"context\",
                \"elements\": [{
                  \"type\": \"mrkdwn\",
                  \"text\": \"Pipeline: devsecops-pipeline | Namespace: tekton-devsecops\"
                }]
              }
            ]
          }]
        }"

      echo ""
      echo "✅ Slack notification sent"

#################################################
# TASK: UPLOAD SECURITY REPORTS TO DEFECTDOJO
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: upload-security-reports
  namespace: tekton-devsecops
spec:
  params:
  - name: engagement-name
    default: Tekton Pipeline
  - name: product-name
    default: DevSecOps-App

  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports

  steps:
  - name: upload
    image: alpine:3.20
    env:
    - name: DD_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: DEFECTDOJO_URL
    - name: DD_TOKEN
      valueFrom:
        secretKeyRef:
          name: defectdojo-secret
          key: token

    script: |
      #!/bin/sh
      set -euo pipefail
      apk add --no-cache curl jq
      REPORT_DIR="/workspace/security-reports"

      echo "========================================"
      echo "DefectDojo URL: $DD_URL"
      echo "Reports directory:"
      ls -lah $REPORT_DIR || true
      echo "========================================"

      ########################################
      # VERIFY DEFECTDOJO AUTH
      ########################################

      echo "Checking DefectDojo API..."
      status=$(curl -s -o /dev/null -w "%{http_code}" \
        -H "Authorization: Token $DD_TOKEN" \
        "$DD_URL/api/v2/users/")

      if [ "$status" != "200" ]; then
        echo "ERROR: DefectDojo authentication failed (HTTP $status)"
        exit 1
      fi

      echo "DefectDojo authentication OK"
      echo "========================================"

      ########################################
      # REPORT UPLOAD LOOP
      ########################################

      found=0

      for report in $REPORT_DIR/*.json $REPORT_DIR/*.sarif; do

        [ -f "$report" ] || continue

        if [ ! -s "$report" ]; then
          echo "Skipping empty report: $report"
          continue
        fi

      ####################################
      # VALIDATE JSON
      ####################################

      if echo "$report" | grep -q ".json$"; then
        if ! cat "$report" | jq empty >/dev/null 2>&1; then
          echo "Invalid JSON report: $report"
          continue
        fi
      fi

      ####################################
      # DETECT SCAN TYPE
      ####################################

      echo "Uploading $report"
      case "$report" in

        *trivy-image*) scan_type="Trivy Scan" ;;
        *trivy-config*) scan_type="Trivy Scan" ;;
        *trivy*) scan_type="Trivy Scan" ;;
        *checkov*.sarif) scan_type="SARIF" ;;
        *checkov*) scan_type="Checkov Report" ;;
        *gitleaks*.sarif) scan_type="SARIF" ;;
        *hadolint*.sarif) scan_type="SARIF" ;;
        *grype*) scan_type="Anchore Grype" ;;
        *sbom*) scan_type="CycloneDX Scan" ;;
        *kubesec-dojo.json) scan_type="Generic Findings Import" ;;
        *zap*) scan_type="ZAP Scan" ;;
        *) scan_type="Generic Findings Import" ;;
      esac

      echo "Scan type: $scan_type"

      ####################################
      # UPLOAD REPORT
      ####################################

      response=$(curl -s -o /dev/null -w "%{http_code}" \
        -X POST "$DD_URL/api/v2/reimport-scan/" \
        -H "Authorization: Token $DD_TOKEN" \
        -H "accept: application/json" \
        -F "scan_type=$scan_type" \
        -F "engagement_name=$(params.engagement-name)" \
        -F "product_name=$(params.product-name)" \
        -F "product_type_name=Applications" \
        -F "auto_create_context=true" \
        -F "active=true" \
        -F "verified=true" \
        -F "minimum_severity=Low" \
        -F "file=@$report")

      if [ "$response" = "201" ]; then
        echo "Upload successful"
      else
        echo "Parser failed ($response) → trying Generic Import"
        curl -s \
          -X POST "$DD_URL/api/v2/reimport-scan/" \
          -H "Authorization: Token $DD_TOKEN" \
          -F "scan_type=Generic Findings Import" \
          -F "engagement_name=$(params.engagement-name)" \
          -F "product_name=$(params.product-name)" \
          -F "product_type_name=Applications" \
          -F "auto_create_context=true" \
          -F "file=@$report"
      fi

      found=1
      echo "----------------------------------------"

      done

      ########################################
      # NO REPORTS FOUND
      ########################################

      if [ "$found" -eq 0 ]; then
        echo "No security reports found."
      fi

      echo "DefectDojo upload stage completed."

#################################################
# TASK: UPDATE GITOPS MANIFESTS
# Clones GitOps repo, updates image tag, commits, pushes
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-gitops-manifests
  namespace: tekton-devsecops
spec:
  params:
  - name: gitops-repo-url
    description: "HTTPS URL of the GitOps repository"
  - name: gitops-branch
    default: main
  - name: dockerhub-repository
    description: "DockerHub repository"
  - name: image-tag
    description: "Image tag"
  - name: manifest-path
    description: "Path to the K8s manifest file to update"
    default: k8s_deployment_service.yaml
  workspaces:
  - name: gitops-workspace
  steps:

  - name: clone-gitops
    image: alpine/git:2.45.2
    workingDir: $(workspaces.gitops-workspace.path)
    env:
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: git-credentials
          key: token
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: git-credentials
          key: username
    script: |
      set -eu

      REPO_URL="$(params.gitops-repo-url)"

      # Inject token into HTTPS URL for auth
      AUTH_URL=$(echo "$REPO_URL" | sed "s|https://|https://${GIT_USERNAME}:${GIT_TOKEN}@|")

      rm -rf gitops-repo
      git clone --depth 1 --branch "$(params.gitops-branch)" "$AUTH_URL" gitops-repo
      # git clone --depth 1 --branch "$(params.gitops-branch)" "$AUTH_URL" .

      echo "✅ GitOps repository cloned"
    # ls
    # ls gitops-repo

  - name: update-image-tag
    image: alpine:3.20
    workingDir: $(workspaces.gitops-workspace.path)
    # workingDir: $(workspaces.gitops-workspace.path)/gitops-repo
    script: |
      set -eu
      echo "Searching for deployment manifests"
      find . -name "*deployment*.yaml"
      
      cd $(workspaces.gitops-workspace.path)/gitops-repo

      MANIFEST="$(params.manifest-path)"
      IMAGE_TAG="$(params.dockerhub-repository):$(params.image-tag)"

      echo "Updating image tag in $MANIFEST"
      echo "New image: $IMAGE_TAG"

      if [ ! -f "$MANIFEST" ]; then
        echo "❌ Manifest file $MANIFEST not found"
        ls -la
        exit 1
      fi

      echo "--- Before ---"
      grep -n 'image:' "$MANIFEST" || true

      # Update the container image line
      sed -i "s|image:.*|image: ${IMAGE_TAG}|g" "$MANIFEST"

      echo "--- After ---"
      grep -n 'image:' "$MANIFEST" || true

      echo "✅ Image tag updated"

  - name: commit-and-push
    image: alpine/git:2.45.2
    workingDir: $(workspaces.gitops-workspace.path)
    # workingDir: $(workspaces.gitops-workspace.path)/gitops-repo
    env:
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: git-credentials
          key: token
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: git-credentials
          key: username
    script: |
      set -eu
      echo "Searching for deployment manifests"
      find . -name "*deployment*.yaml"
      cd $(workspaces.gitops-workspace.path)/gitops-repo

      git config user.email "tekton-pipeline@devsecops.local"
      git config user.name "Tekton CI/CD"

      # Check for changes
      if git diff --quiet; then
        echo "ℹ️ No changes detected — image tag already up to date"
        exit 0
      fi

      git add -A
      git commit -m "chore(deploy): update image to $(params.dockerhub-repository):$(params.image-tag)

      Automated by Tekton DevSecOps pipeline.
      All security gates passed, image signed with Cosign."

      git push origin "$(params.gitops-branch)"

      echo "✅ GitOps manifest pushed to $(params.gitops-branch)"

#################################################
# TASK: VERIFY ARGOCD SYNC
# Waits for ArgoCD to detect the change and deploy
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: verify-argocd-sync
  namespace: tekton-devsecops
spec:
  params:
  - name: app-name
    description: "ArgoCD application name"
    default: devsecops-app
  - name: timeout
    description: "Timeout in seconds to wait for sync"
    default: "300"
  steps:

  - name: trigger-sync
    image: quay.io/argoproj/argocd:v2.14.11
    env:
    - name: ARGOCD_SERVER
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: ARGOCD_SERVER
    - name: ARGOCD_PASSWORD
      valueFrom:
        secretKeyRef:
          name: argo-pass
          key: password
    script: |
      #!/bin/sh
      set -eu
      # set -euxo pipefail

      APP_NAME="$(params.app-name)"
      argocd version --client
      echo "===== DEBUG INFO ====="
      echo "ARGOCD_SERVER = $ARGOCD_SERVER"
      echo "ARGOCD_PASSWORD length = ${#ARGOCD_PASSWORD}"
      echo "APP_NAME = $APP_NAME"
      echo "======================"

      echo "Logging into ArgoCD..."

      argocd login "$ARGOCD_SERVER" \
        --username admin \
        --password "$ARGOCD_PASSWORD" \
        --insecure \
        --grpc-web 
      # --plaintext

      echo "Triggering ArgoCD sync for $APP_NAME..."
      argocd app sync "$APP_NAME" --force --prune || true

      echo "✅ Sync triggered"

  - name: wait-for-health
    image: quay.io/argoproj/argocd:v2.14.11
    env:
    - name: ARGOCD_SERVER
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: ARGOCD_SERVER
    - name: ARGOCD_PASSWORD
      valueFrom:
        secretKeyRef:
          name: argo-pass
          key: password
    script: |
      #!/bin/sh
      set -eu

      APP_NAME="$(params.app-name)"
      argocd version --client
      TIMEOUT="$(params.timeout)"

      argocd login "$ARGOCD_SERVER" \
        --username admin \
        --password "$ARGOCD_PASSWORD" \
        --insecure \
        --grpc-web 
      # --plaintext

      echo "Waiting for $APP_NAME to become Healthy (timeout: ${TIMEOUT}s)..."
      argocd app wait "$APP_NAME" \
        --health \
        --timeout "$TIMEOUT"

      echo ""
      echo "=== Application Status ==="
      argocd app get "$APP_NAME" --output wide

      HEALTH=$(argocd app get "$APP_NAME" -o json | grep -o '"status":"Healthy"' | head -1 || true)

      if [ -z "$HEALTH" ]; then
        echo "⚠ Application may not be fully healthy"
      else
        echo "✅ ArgoCD deployment verified — $APP_NAME is Healthy"
      fi

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cosign-sign-attest
  namespace: tekton-devsecops
spec:
  params:
  - name: image
  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports
  volumes:
  - name: cosign-key
    secret:
      secretName: cosign-key
  stepTemplate:
    volumeMounts:
    - name: cosign-key
      mountPath: /etc/cosign
      readOnly: true
  steps:
  - name: sign
    image: ghcr.io/sigstore/cosign/cosign:v2.4.1
    env:
    - name: COSIGN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: cosign-key
          key: password
    script: |
      set -eu
      cosign sign --key /etc/cosign/cosign.key $(params.image)

#################################################
# PIPELINE
#################################################
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: devsecops-pipeline
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source-workspace
  - name: maven-cache
  - name: security-reports
  - name: gitops-workspace
  params:
  - name: repo-url
  - name: revision
    default: main
  - name: dockerhub-repository
    description: "Dockerhub repository"
    default: "username/devsecops"
  - name: image-tag
    description: "Image tag for GitOps manifest update"
    default: latest
  - name: gitops-repo-url
    description: "GitOps repository URL"
    default: "https://github.com/0x70ssAM/devsecops"
  - name: gitops-branch
    default: main
  - name: argocd-app-name
    default: devsecops-app
  - name: app-url
    description: "Deployed application URL for DAST scanning"
    default: ""
  tasks:
  - name: clone
    taskRef:
      name: git-clone
    params:
    - name: repo-url
      value: $(params.repo-url)
    - name: revision
      value: $(params.revision)
    workspaces:
    - name: output
      workspace: source-workspace

  - name: compile
    onError: continue
    runAfter: [clone]
    taskRef:
      name: maven-compile
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  # =============================================
  # PARALLEL: Security scans after clone
  # =============================================

  - name: secret-gitleaks
    onError: continue
    runAfter: [clone]
    taskRef:
      name: gitleaks
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: secret-trufflehog
    onError: continue
    runAfter: [clone]
    taskRef:
      name: trufflehog
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: hadolint
    onError: continue
    runAfter: [clone]
    taskRef:
      name: hadolint
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: conftest-docker
    onError: continue
    runAfter: [clone]
    taskRef:
      name: conftest-docker
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: checkov
    onError: continue
    runAfter: [clone]
    taskRef:
      name: checkov-iac
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: conftest-k8s
    onError: continue
    runAfter: [clone]
    taskRef:
      name: conftest-k8s
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: k8s-config-scan
    onError: continue
    runAfter: [clone]
    taskRef:
      name: k8s-security
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  # =============================================
  # BUILD: unit tests → mutation → package
  # =============================================

  - name: unit-tests
    onError: continue
    runAfter: [clone]
    taskRef:
      name: unit-tests
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: pit-tests
    onError: continue
    runAfter: [unit-tests]
    taskRef:
      name: pit-tests
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  - name: package
    onError: continue
    runAfter: [pit-tests]
    taskRef:
      name: maven-package
    workspaces:
    - name: source
      workspace: source-workspace
    - name: maven-cache
      workspace: maven-cache

  # =============================================
  # POST-PACKAGE: SAST, SBOM, SCA, Trivy
  # =============================================

  - name: sonar
    onError: continue
    runAfter: [package]
    taskRef:
      name: sonarqube-scan
    workspaces:
    - name: source
      workspace: source-workspace

  - name: source-sbom
    onError: continue
    runAfter: [package]
    taskRef:
      name: syft-source-sbom
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: sca
    onError: continue
    runAfter: [source-sbom]
    taskRef:
      name: grype-scan
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: trivy-fs
    onError: continue
    runAfter: [package]
    taskRef:
      name: trivy-fs
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  # =============================================
  # CONTAINER LIFECYCLE: build → scan → SBOM → sign
  # =============================================

  - name: build-image-archive
    onError: continue
    runAfter:
    - sonar
    - sca
    - trivy-fs
    - secret-gitleaks
    - secret-trufflehog
    - hadolint
    - conftest-docker
    - checkov
    taskRef:
      name: kaniko-build-archive
    params:
    - name: dockerhub-repository
      value: $(params.dockerhub-repository)
    - name: image-tag
      value: $(params.image-tag)
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  - name: image-scan
    onError: continue
    runAfter: [build-image-archive]
    taskRef:
      name: trivy-image-archive
    params:
    - name: dockerhub-repository
      value: $(params.dockerhub-repository)
    - name: image-tag
      value: $(params.image-tag)
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: image-sbom
    onError: continue
    runAfter: [build-image-archive]
    taskRef:
      name: syft-image-sbom
    params:
    - name: dockerhub-repository
      value: $(params.dockerhub-repository)
    - name: image-tag
      value: $(params.image-tag)
    workspaces:
    - name: security-reports
      workspace: security-reports

  - name: image-sca
    onError: continue
    runAfter: [image-sbom]
    taskRef:
      name: grype-image-scan
    workspaces:
    - name: security-reports
      workspace: security-reports

  # - name: cosign-sign
  #   onError: continue
  #   runAfter:
  #   - image-scan
  #   - image-sca
  #   taskRef:
  #     name: cosign-sign-attest
  #   params:
  #   - name: dockerhub-repository
  #     value: $(params.dockerhub-repository)
  #   - name: image-tag
  #     value: $(params.image-tag)
  #   workspaces:
  #   - name: security-reports
  #     workspace: security-reports

  # =============================================
  # GITOPS: update manifests → ArgoCD sync
  # Runs ONLY after all security gates + cosign pass
  # =============================================

  - name: update-gitops-manifests
    onError: continue
    runAfter:
    # - cosign-sign
    - build-image-archive
    taskRef:
      name: update-gitops-manifests
    params:
    - name: gitops-repo-url
      value: $(params.gitops-repo-url)
    - name: gitops-branch
      value: $(params.gitops-branch)
    - name: dockerhub-repository
      value: $(params.dockerhub-repository)
    - name: image-tag
      value: $(params.image-tag)
    workspaces:
    - name: gitops-workspace
      workspace: gitops-workspace

  - name: verify-argocd-sync
    onError: continue
    runAfter: [update-gitops-manifests]
    taskRef:
      name: verify-argocd-sync
    params:
    - name: app-name
      value: $(params.argocd-app-name)
    - name: timeout
      value: "300"
  
  - name: resolve-app-url
    onError: continue
    runAfter: [verify-argocd-sync]
    taskRef:
      name: resolve-app-url

  # =============================================
  # SUMMARIZE: waits for ALL scans + deploy (race fix)
  # =============================================

  - name: summarize-security-reports
    onError: continue
    runAfter:
    - image-scan
    - image-sca
    # - cosign-sign
    - conftest-k8s
    - k8s-config-scan
    - verify-argocd-sync
    taskRef:
      name: security-report-summary
    workspaces:
    - name: security-reports
      workspace: security-reports

  # =============================================
  # UPLOAD: waits for summary (all scans done)
  # =============================================

  - name: upload-security-reports
    onError: continue
    runAfter: [summarize-security-reports]
    taskRef:
      name: upload-security-reports
    workspaces:
    - name: security-reports
      workspace: security-reports

  # =============================================
  # DAST: OWASP ZAP after ArgoCD deployment
  # Runs only if app-url param is provided
  # =============================================

  - name: owasp-zap-dast
    onError: continue
    # runAfter: [verify-argocd-sync]
    runAfter: [resolve-app-url]
    # when:
    # - input: "$(params.app-url)"
    #   operator: notin
    #   values: [""]
    taskRef:
      name: owasp-zap-scan
    params:
    - name: target-url
      # value: $(params.app-url)
      value: $(tasks.resolve-app-url.results.app-url)
    - name: scan-type
      value: "api-scan"
    workspaces:
    - name: source
      workspace: source-workspace
    - name: security-reports
      workspace: security-reports

  # =============================================
  # FINALLY: always runs (success or failure)
  # =============================================

  finally:
  - name: notify-success
    when:
    - input: "$(tasks.status)"
      operator: in
      values: ["Succeeded"]
    taskRef:
      name: slack-notify
    params:
    - name: message
      value: "DevSecOps pipeline *succeeded* for $(params.repo-url) @ $(params.revision)\nImage: $(params.dockerhub-repository):$(params.image-tag)\nGitOps: $(params.gitops-repo-url)\nArgoCD App: $(params.argocd-app-name)"
    - name: status
      value: "success"

  - name: notify-failure
    when:
    - input: "$(tasks.status)"
      operator: in
      values: ["Failed"]
    taskRef:
      name: slack-notify
    params:
    - name: message
      value: "DevSecOps pipeline *FAILED* for $(params.repo-url) @ $(params.revision)\nImage: $(params.dockerhub-repository):$(params.image-tag)"
    - name: status
      value: "failure"

#################################################
# PIPELINERUN
#################################################
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: devsecops-run
  # generateName: devsecops-run-
  namespace: tekton-devsecops
spec:
  pipelineRef:
    name: devsecops-pipeline
  taskRunTemplate:
    serviceAccountName: tekton-devsecops-sa
  workspaces:
  - name: source-workspace
    # persistentVolumeClaim:
    #   claimName: tekton-workspace
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteMany
        storageClassName: nfs-client
        resources:
          requests:
            storage: 10Gi
  - name: maven-cache
    # persistentVolumeClaim:
    #   claimName: maven-cache
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteMany
        storageClassName: nfs-client
        resources:
          requests:
            storage: 10Gi
  - name: security-reports
    # persistentVolumeClaim:
    #   claimName: security-reports
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteMany
        storageClassName: nfs-client
        resources:
          requests:
            storage: 10Gi
  - name: gitops-workspace
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteMany
        storageClassName: nfs-client
        resources:
          requests:
            storage: 2Gi
  params:
  - name: repo-url
    value: https://github.com/0x70ssAM/devsecops
  - name: revision
    value: main
  - name: dockerhub-repository
    value: "hossamibraheem/devsecops"
  - name: image-tag
    value: "latest"
  - name: gitops-repo-url
    value: https://github.com/0x70ssAM/devsecops
  - name: gitops-branch
    value: main
  - name: argocd-app-name
    value: devsecops-app
  - name: app-url
    value: ""


