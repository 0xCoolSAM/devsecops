################################################
# TASK: GRYPE IMAGE SCAN — SCA from image SBOM
# SECURITY GATE: Fails on CRITICAL vulnerabilities
################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: grype-image-scan
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:
  - name: scan-image-sbom
    image: anchore/grype:v0.86.1
    workingDir: /workspace/security-reports
    script: |
      set -eu
      /grype sbom:/workspace/security-reports/sbom-image.json \
        -o json \
        --file /workspace/security-reports/grype-image-report.json

      echo "Checking image SBOM for CRITICAL vulnerabilities..."
      CRITICAL_COUNT=$(cat /workspace/security-reports/grype-image-report.json | \
        grep -o '"severity":"Critical"' | wc -l || echo "0")

      echo "Found $CRITICAL_COUNT CRITICAL vulnerabilities in container image dependencies"

      if [ "$CRITICAL_COUNT" -gt 0 ]; then
        echo "❌ SECURITY GATE FAILED: $CRITICAL_COUNT CRITICAL image vulnerabilities"
        exit 1
      fi

      echo "✅ Grype image scan passed — no CRITICAL vulnerabilities"
################################################
# TASK: COSIGN SIGN — sign the container image
################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: cosign-sign-attest
  namespace: tekton-devsecops
spec:
  params:
  - name: dockerhub-repository
  - name: image-tag
  workspaces:
  - name: security-reports
    mountPath: /workspace/security-reports
  volumes:
  - name: cosign-key
    secret:
      secretName: cosign-key
  - name: docker-config
    secret:
      secretName: dockerhub-secret
      items:
      - key: .dockerconfigjson
        path: config.json
  stepTemplate:
    volumeMounts:
    - name: cosign-key
      mountPath: /etc/cosign
      readOnly: true
    - name: docker-config
      mountPath: /root/.docker
  steps:
  - name: sign
    image: ghcr.io/sigstore/cosign/cosign:v2.4.1
    env:
    - name: COSIGN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: cosign-key
          key: password
    script: |
      set -eu
      IMAGE="$(params.dockerhub-repository):$(params.image-tag)"
      echo "Signing image $IMAGE..."
      cosign sign --yes --key /etc/cosign/cosign.key $IMAGE
      echo "✅ Image signed successfully"

  - name: attest-sbom
    image: ghcr.io/sigstore/cosign/cosign:v2.4.1
    env:
    - name: COSIGN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: cosign-key
          key: password
    script: |
      set -eu
      IMAGE="$(params.dockerhub-repository):$(params.image-tag)"
      if [ -f /workspace/security-reports/sbom-image.json ]; then
        echo "Attesting SBOM to image $IMAGE..."
        cosign attest --yes --key /etc/cosign/cosign.key \
          --predicate /workspace/security-reports/sbom-image.json \
          --type cyclonedx \
          $IMAGE
        echo "✅ SBOM attestation attached"
      else
        echo "⚠ No image SBOM found, skipping attestation"
      fi

#################################################
# TASK: K8S SECURITY
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k8s-security
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:

  #################################################
  # STEP 1 — KUBESEC SCAN
  #################################################

  - name: kubesec-scan
    image: kubesec/kubesec:v2
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu
      mkdir -p /workspace/security-reports
      echo "Running Kubesec scan..."
      kubesec scan k8s_deployment_service.yaml > /workspace/security-reports/kubesec.json || true

  #################################################
  # STEP 2 — CONVERT FOR DEFECTDOJO
  #################################################

  - name: convert-kubesec
    image: alpine:3.20
    script: |
      #!/bin/sh
      set -eu
      apk add --no-cache jq
      echo "Converting Kubesec → DefectDojo format..."
      jq 'if . == null or (. | length) == 0 then {name:"Kubesec Scan",findings:[]} else {
        name: "Kubesec Scan",
        findings: [
          .[] | {
            title: .message,
            severity:
              (if .score < 0 then "High"
               elif .score < 5 then "Medium"
               else "Low"
               end),
            description: (.object + " " + .fileName),
            file_path: .fileName,
            active: true,
            verified: false
          }
        ]
      } end' \
      /workspace/security-reports/kubesec.json \
      > /workspace/security-reports/kubesec-dojo.json || true

  #################################################
  # STEP 3 — TRIVY CONFIG SCAN
  #################################################

  - name: trivy-config
    image: aquasec/trivy:0.69.3
    workingDir: $(workspaces.source.path)
    script: |
      #!/bin/sh
      set -eu
      echo "Running Trivy config scan..."
      trivy config \
        --format json \
        --output /workspace/security-reports/trivy-config.json \
        k8s_deployment_service.yaml

