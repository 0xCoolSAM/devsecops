#################################################
# TASK: GIT CLONE
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-devsecops
spec:
  params:
  - name: repo-url
  - name: revision
    default: main
  workspaces:
  - name: output
  steps:
  - name: clone
    image: alpine/git:2.45.2
    workingDir: $(workspaces.output.path)
    script: |
      set -eu
      rm -rf repo
      git clone --depth 1 --branch "$(params.revision)" "$(params.repo-url)" repo
      cp -R repo/. $(workspaces.output.path)/
      rm -rf repo

#################################################
# TASK: MAVEN COMPILE
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-compile
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: maven-cache
    mountPath: /root/.m2
  steps:
  - name: compile
    image: maven:3.9.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mvn -B -ntp -Dmaven.repo.local=/root/.m2 -DskipTests compile

#################################################
# TASK: UNIT TESTS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: maven-cache
    mountPath: /root/.m2
  steps:
  - name: test
    image: maven:3.9.9-eclipse-temurin-17
    securityContext:
      runAsUser: 0
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mkdir -p /workspace/source/target
      chmod -R 777 /workspace/source
      mvn -B -ntp -Dmaven.repo.local=/root/.m2 clean test
    # mvn -B -ntp -Dmaven.repo.local=/root/.m2 test

#################################################
# TASK: MUTATION TESTS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pit-tests
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: maven-cache
    mountPath: /root/.m2
  steps:
  - name: mutation
    image: maven:3.9.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mvn -B -ntp -Dmaven.repo.local=/root/.m2 org.pitest:pitest-maven:mutationCoverage

#################################################
# TASK: MAVEN PACKAGE
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-package
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: maven-cache
    mountPath: /root/.m2
  steps:
  - name: package
    image: maven:3.9.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mvn -B -ntp -Dmaven.repo.local=/root/.m2 -DskipTests package

#################################################
# TASK: SONAR SCAN
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube-scan
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  steps:
  - name: scan
    image: sonarsource/sonar-scanner-cli:latest
    workingDir: $(workspaces.source.path)
    env:
    - name: SONAR_HOST_URL
      valueFrom:
        configMapKeyRef:
          name: devsecops-urls
          key: SONAR_URL
    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: sonar-secret
          key: token
    script: |
      set -eu
      sonar-scanner \
        -Dsonar.projectKey=devsecops \
        -Dsonar.sources=. \
        -Dsonar.java.binaries=target/classes \
        -Dsonar.host.url=$SONAR_HOST_URL \
        -Dsonar.token=$SONAR_TOKEN

#################################################
# TASK: GITLEAKS
#################################################
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitleaks
  namespace: tekton-devsecops
spec:
  workspaces:
  - name: source
  - name: security-reports
    mountPath: /workspace/security-reports
  steps:
  - name: scan-secrets
    image: zricethezav/gitleaks:v8.18.4
    workingDir: $(workspaces.source.path)
    script: |
      set -eu
      mkdir -p /workspace/security-reports
      gitleaks detect \
        --source . \
        --no-git \
        --report-format sarif \
        --report-path /workspace/security-reports/gitleaks.sarif \
        || true

#################################################
# TASK: TRUFFLEHOG
