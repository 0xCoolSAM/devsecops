############################################
# NAMESPACE
############################################
apiVersion: v1
kind: Namespace
metadata:
  name: tekton-devsecops
---
############################################
# SERVICE ACCOUNT
############################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
---
############################################
# RBAC
############################################
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-devsecops-admin
subjects:
- kind: ServiceAccount
  name: tekton-devsecops-sa
  namespace: tekton-devsecops
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
############################################
# PVC
############################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tekton-workspace
  namespace: tekton-devsecops
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
############################################
# SECRETS
############################################
apiVersion: v1
kind: Secret
metadata:
  name: sonar-secret
  namespace: tekton-devsecops
type: Opaque
stringData:
  token: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: defectdojo-secret
  namespace: tekton-devsecops
type: Opaque
stringData:
  url: http://defectdojo:8080
  token: CHANGE_ME
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-secret
  namespace: tekton-devsecops
type: Opaque
stringData:
  webhook: CHANGE_ME

############################################
# TASKS
############################################

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-devsecops
spec:
  params:
  - name: repo-url
  workspaces:
  - name: source
  steps:
  - name: clone
    image: alpine/git
    script: |
      git clone $(params.repo-url) $(workspaces.source.path)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: maven-build
spec:
  workspaces:
  - name: source
  steps:
  - name: build
    image: maven:3.9-eclipse-temurin-17
    workingDir: $(workspaces.source.path)
    script: |
      mvn clean package -DskipTests

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: unit-tests
spec:
  workspaces:
  - name: source
  steps:
  - name: tests
    image: maven:3.9
    workingDir: $(workspaces.source.path)
    script: |
      mvn test

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sonarqube
spec:
  params:
  - name: sonar-url
  workspaces:
  - name: source
  steps:
  - name: scan
    image: sonarsource/sonar-scanner-cli
    env:
    - name: SONAR_TOKEN
      valueFrom:
        secretKeyRef:
          name: sonar-secret
          key: token
    script: |
      sonar-scanner \
      -Dsonar.host.url=$(params.sonar-url) \
      -Dsonar.login=$SONAR_TOKEN

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sbom
spec:
  workspaces:
  - name: source
  steps:
  - name: generate
    image: anchore/syft
    script: |
      syft dir:$(workspaces.source.path) -o json

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: dependency-check
spec:
  workspaces:
  - name: source
  steps:
  - name: scan
    image: owasp/dependency-check
    script: |
      dependency-check.sh --scan $(workspaces.source.path)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-fs
spec:
  workspaces:
  - name: source
  steps:
  - name: scan
    image: aquasec/trivy
    script: |
      trivy fs $(workspaces.source.path)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: hadolint
spec:
  workspaces:
  - name: source
  steps:
  - name: lint
    image: hadolint/hadolint
    script: |
      hadolint $(workspaces.source.path)/Dockerfile

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kaniko-build
spec:
  params:
  - name: image
  workspaces:
  - name: source
  steps:
  - name: build
    image: gcr.io/kaniko-project/executor
    args:
    - --dockerfile=$(workspaces.source.path)/Dockerfile
    - --context=$(workspaces.source.path)
    - --destination=$(params.image)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-image
spec:
  params:
  - name: image
  steps:
  - name: scan
    image: aquasec/trivy
    script: |
      trivy image $(params.image)

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: kube-bench
spec:
  steps:
  - name: scan
    image: aquasec/kube-bench
    script: |
      kube-bench run --targets node
      
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: opa-scan
spec:
  workspaces:
  - name: source
  steps:
  - name: policy
    image: openpolicyagent/conftest
    script: |
      conftest test $(workspaces.source.path)/Dockerfile

---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: zap
spec:
  params:
  - name: target
  steps:
  - name: scan
    image: owasp/zap2docker-stable
    script: |
      zap-baseline.py -t $(params.target)

############################################
# PIPELINE
############################################
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: devsecops-enterprise
  namespace: tekton-devsecops
spec:

  workspaces:
  - name: workspace

  params:
  - name: repo-url
  - name: image
  - name: sonar-url
  - name: zap-target

  tasks:

  - name: clone
    taskRef: {name: git-clone}
    params:
    - name: repo-url
      value: $(params.repo-url)
    workspaces:
    - name: source
      workspace: workspace

  - name: build
    runAfter: [clone]
    taskRef: {name: maven-build}
    workspaces:
    - name: source
      workspace: workspace

  - name: tests
    runAfter: [build]
    taskRef: {name: unit-tests}
    workspaces:
    - name: source
      workspace: workspace

  # PARALLEL SECURITY SCANS
  - name: sonar
    runAfter: [tests]
    taskRef: {name: sonarqube}
    params:
    - name: sonar-url
      value: $(params.sonar-url)
    workspaces:
    - name: source
      workspace: workspace

  - name: dependency
    runAfter: [tests]
    taskRef: {name: dependency-check}
    workspaces:
    - name: source
      workspace: workspace

  - name: trivyfs
    runAfter: [tests]
    taskRef: {name: trivy-fs}
    workspaces:
    - name: source
      workspace: workspace

  - name: hadolint
    runAfter: [tests]
    taskRef: {name: hadolint}
    workspaces:
    - name: source
      workspace: workspace

  - name: build-image
    runAfter: [sonar,dependency,trivyfs,hadolint]
    taskRef: {name: kaniko-build}
    params:
    - name: image
      value: $(params.image)
    workspaces:
    - name: source
      workspace: workspace

  - name: image-scan
    runAfter: [build-image]
    taskRef: {name: trivy-image}
    params:
    - name: image
      value: $(params.image)

  - name: cluster-scan
    runAfter: [image-scan]
    taskRef: {name: kube-bench}

  - name: dast
    runAfter: [cluster-scan]
    taskRef: {name: zap}
    params:
    - name: target
      value: $(params.zap-target)

############################################
# PIPELINERUN
############################################
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: devsecops-run-
  namespace: tekton-devsecops
spec:
  taskRunTemplate:
    serviceAccountName: tekton-devsecops-sa
  # serviceAccountName: tekton-devsecops-sa

  pipelineRef:
    name: devsecops-enterprise

  workspaces:
  - name: workspace
    persistentVolumeClaim:
      claimName: tekton-workspace

  params:
  - name: repo-url
    value: https://github.com/spring-projects/spring-petclinic.git
  - name: image
    value: docker.io/demo/devsecops:latest
  - name: sonar-url
    value: http://sonarqube:9000
  - name: zap-target
    value: http://demo-app